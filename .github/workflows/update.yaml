name: Update from upstream

on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: casey/just
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo snap install just --classic
          sudo snap install yq

      - name: Run update
        id: update
        run: |
          just update ${{ env.UPSTREAM_REPO }} 2>&1 | tee update_output.txt
          if grep -q "Already at version\|nothing to do" update_output.txt; then
            echo "needs_pr=false" >> $GITHUB_OUTPUT
          else
            echo "needs_pr=true" >> $GITHUB_OUTPUT
            NEW_VERSION=$(yq -r '.version' latest/snap/snapcraft.yaml)
            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Pull Request
        if: steps.update.outputs.needs_pr == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "chore: bump just to ${{ steps.update.outputs.version }}"
          title: "chore: bump just to ${{ steps.update.outputs.version }}"
          body: |
            This PR updates `just` to version ${{ steps.update.outputs.version }}.

            **Release notes:**
            https://github.com/${{ env.UPSTREAM_REPO }}/releases/tag/${{ steps.update.outputs.version }}

            This PR was automatically created by the update workflow.
          branch: chore/bump-to-${{ steps.update.outputs.version }}
          delete-branch: true
          labels: |
            dependencies
            automated
